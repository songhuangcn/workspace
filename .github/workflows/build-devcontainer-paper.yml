name: build-devcontainer-paper

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - build-devcontainer
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short commit SHA
        id: vars
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: echo "short_sha=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.paper
          platforms: linux/arm64
          push: true
          tags: |
            songhuangcn/workspace-paper:commit-${{ steps.vars.outputs.short_sha }}
            songhuangcn/workspace-paper:latest
